general {
    lock_cmd = anarchy-system-lock                         # lock screen and 1password
    before_sleep_cmd = ANARCHY_LOCK_ONLY=true anarchy-system-lock    # lock before suspend without scheduling display off.
    after_sleep_cmd = sleep 1 && anarchy-system-wake                 # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

# Start screensaver after 2.5 minutes
listener {
    timeout = 150
    on-timeout = pidof hyprlock || anarchy-launch-screensaver
}

# Lock system after 5 minutes (screensaver resets idle timer, so have to just do half + 2s margin)
listener {
    timeout = 152
    on-timeout = anarchy-system-lock
    on-resume = anarchy-system-wake
}
